name: Deploy to wzhiypm.com

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'
  workflow_dispatch:
    inputs:
      action:
        description: '操作类型'
        type: choice
        options:
          - deploy
          - rollback
        default: deploy
        required: true
      project:
        description: 'Repo 目录名（如 shipping-estimate）'
        type: string
        required: true
      version:
        description: '回滚版本（仅 rollback 时需要，如 v2）'
        type: string
        required: false

env:
  HOST: ${{ secrets.DEPLOY_HOST }}
  USER: ${{ secrets.DEPLOY_USER }}

jobs:
  deploy:
    name: ${{ inputs.action == 'rollback' && '回滚' || '部署' }} ${{ inputs.project || '' }}
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 识别项目名 ==========
      - name: 📦 识别项目名
        id: project
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- projects/)
            PROJECT=$(echo "$CHANGED" | grep -oP 'projects/\K[^/]+' | sort -u | head -1)
          else
            PROJECT="${{ inputs.project }}"
          fi
          if [ -z "$PROJECT" ]; then
            echo "No project changes detected, exiting"
            exit 0
          fi
          echo "name=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "📦 项目: $PROJECT"
          echo "project_name=$PROJECT" >> "$GITHUB_ENV"

      # ========== 项目名映射 ==========
      - name: 🔄 映射服务器项目名
        id: server_name
        run: |
          PROJECT="${{ steps.project.outputs.name }}"
          case "$PROJECT" in
            shipping-estimate)
              SERVER="20260703_1205-渠道运费预估"
              ;;
            *)
              SERVER="$PROJECT"
              ;;
          esac
          echo "name=$SERVER" >> "$GITHUB_OUTPUT"
          echo "server_name=$SERVER" >> "$GITHUB_ENV"
          echo "🔄 映射: $PROJECT → $SERVER"

      # ========== 构建 ==========
      - name: ⚙️ 设置 Node.js 22
        if: inputs.action != 'rollback'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🔨 构建
        if: inputs.action != 'rollback'
        run: |
          echo "📦 项目: ${{ env.project_name }}"
          echo "📂 $(pwd)/projects/${{ env.project_name }}"
          cd "projects/${{ env.project_name }}"
          if [ -f "package-lock.json" ]; then npm ci; else npm install; fi
          npm run build
          echo "✅ 构建完成"

      # ========== SSH 配置 ==========
      - name: 🔑 配置 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

      # ========== 回滚 ==========
      - name: ↩️ 回滚到 ${{ inputs.version }}
        if: inputs.action == 'rollback'
        run: |
          ssh $USER@$HOST "deploy-wzhiypm ${{ env.server_name }} --rollback ${{ inputs.version }}"
          echo "✅ 回滚完成: https://wzhiypm.com/projects/${{ env.server_name }}/"

      # ========== 传输 + 部署 ==========
      - name: 📤 传输构建产物到服务器
        if: inputs.action != 'rollback'
        run: |
          set -x
          echo "🔑 测试 SSH 连接..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 $USER@$HOST "echo SSH_CONNECTED" 2>&1 || { echo "❌ SSH FAILED"; exit 1; }
          SRC="projects/${{ env.project_name }}"
          if [ -d "$SRC/dist" ]; then BUILD_DIR="$SRC/dist"
          elif [ -d "$SRC/build" ]; then BUILD_DIR="$SRC/build"
          else BUILD_DIR="$SRC"; fi
          rsync -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            -az --delete "$BUILD_DIR/" $USER@$HOST:/tmp/deploy-${{ env.server_name }}/

      - name: 🚀 执行服务器部署
        if: inputs.action != 'rollback'
        run: |
          ssh $USER@$HOST "deploy-wzhiypm ${{ env.server_name }} /tmp/deploy-${{ env.server_name }} && rm -rf /tmp/deploy-${{ env.server_name }}"
          echo "✅ https://wzhiypm.com/projects/${{ env.server_name }}/"
